<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f7;min-height:100vh;padding:10px;}
input,select,textarea{width:100%;padding:12px 14px;border:1.5px solid #dde0e8;border-radius:8px;background:#fff;color:#1a1a2e;font-family:inherit;font-size:16px;transition:border-color .15s,box-shadow .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.12);}
button{cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:8px;border:none;font-size:14px;font-weight:700;transition:opacity .15s,transform .1s;min-height:44px;}
.btn:active{transform:scale(.97);}
.btn-blue{background:#185FA5;color:#fff;}.btn-blue:hover{opacity:.85;}
.btn-green{background:#27500A;color:#fff;}.btn-green:hover{opacity:.85;}
.btn-red{background:#A32D2D;color:#fff;}.btn-red:hover{opacity:.85;}
.btn-ghost{background:#fff;color:#444;border:1.5px solid #dde0e8;}.btn-ghost:hover{background:#f5f5f5;}
.btn-orange{background:#D97706;color:#fff;}.btn-orange:hover{opacity:.85;}
.btn-sm{padding:8px 16px;font-size:13px;min-height:40px;}
.btn-lg{padding:14px 20px;font-size:16px;width:100%;border-radius:10px;min-height:48px;}
.card{background:#fff;border-radius:14px;border:1.5px solid #e8eaf0;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.grid2{display:grid;grid-template-columns:1fr;gap:13px;}
.grid3{display:grid;grid-template-columns:1fr;gap:13px;}
.span2{grid-column:1/-1;}
.fl{font-size:13px;color:#555;display:block;margin-bottom:6px;font-weight:700;letter-spacing:.02em;}
.badge{font-size:11px;padding:4px 10px;border-radius:99px;font-weight:700;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;}
.tab-bar{display:flex;gap:4px;padding:5px;border-radius:11px;background:#e4e6ee;margin-bottom:18px;}
.tab-btn{flex:1;padding:12px 8px;font-size:14px;border-radius:8px;border:none;font-weight:600;transition:all .15s;min-height:44px;}
.sec-card{border-radius:14px;overflow:hidden;margin-bottom:16px;}
.sec-head{padding:16px 20px;display:flex;align-items:center;gap:12px;}
.sec-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sec-body{padding:18px 20px;background:#fff;}
.chk-label{display:inline-flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;padding:10px 14px;border-radius:8px;border:1.5px solid #dde0e8;background:#fff;font-weight:500;transition:all .12s;user-select:none;min-height:44px;}
.chk-label:hover{border-color:#185FA5;background:#eef4fb;}
.chk-label input[type=checkbox],.chk-label input[type=radio]{width:18px;height:18px;margin:0;cursor:pointer;}
.chk-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.member-card{background:#fff;border:1.5px solid #e8eaf0;border-radius:13px;padding:18px 20px;display:flex;gap:15px;align-items:flex-start;margin-bottom:12px;transition:border-color .15s,box-shadow .15s;}
.member-card:hover{border-color:#b0b8d0;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.stat-box{border-radius:13px;padding:20px;text-align:center;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#fff;border-radius:13px;border:1.5px solid #e8eaf0;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);gap:12px;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;font-size:14px;font-weight:700;color:#fff;z-index:9999;display:none;box-shadow:0 4px 18px rgba(0,0,0,.2);max-width:90vw;text-align:center;}
#fileInput{display:none;}
.admin-member-card{background:#fff;border:1.5px solid #e8eaf0;border-radius:12px;padding:16px;margin-bottom:12px;transition:border-color .15s,box-shadow .15s;}
.admin-member-card:hover{border-color:#b0b8d0;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.loading-screen{text-align:center;padding:5rem 1rem;}
.loading-screen .spinner{width:40px;height:40px;border:4px solid #e8eaf0;border-top-color:#185FA5;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.config-warning{background:#FFF3CD;border:2px solid #F0AD00;border-radius:12px;padding:20px;margin:20px auto;max-width:500px;font-size:14px;color:#7A5100;line-height:1.6;}
.config-warning h3{font-size:16px;font-weight:800;margin-bottom:10px;color:#5C3A00;}
.config-warning code{background:#FFE5A0;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:12px;}
@media(min-width:640px){body{padding:20px;}.card{padding:22px 26px;}.grid2{grid-template-columns:1fr 1fr;}.grid3{grid-template-columns:1fr 1fr 1fr;}.chk-row{justify-content:flex-start;}.stat-box{text-align:left;}.topbar{gap:16px;}}
@media(min-width:768px){input,select,textarea{font-size:13px;padding:9px 12px;}.btn{font-size:13px;padding:10px 20px;min-height:auto;}.btn-sm{padding:6px 14px;font-size:12px;min-height:auto;}.btn-lg{padding:13px 20px;font-size:15px;min-height:auto;}.fl{font-size:12px;margin-bottom:5px;}.tab-btn{padding:9px 6px;font-size:13px;min-height:auto;}.chk-label{font-size:13px;padding:7px 13px;min-height:auto;}.chk-label input[type=checkbox],.chk-label input[type=radio]{width:15px;height:15px;}.sec-head{padding:14px 18px;}.sec-ico{width:38px;height:38px;font-size:19px;}.sec-body{padding:16px 18px;}.member-card{padding:15px 17px;gap:13px;margin-bottom:10px;}.topbar{padding:13px 18px;}#amobile{display:none!important;}#atable{display:block!important;}}
</style>

// ── Utilities ────────────────────────────────────────────────
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function initials(n){return(n||'?').split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2)||'?'}
function gv(id){var el=document.getElementById(id);return el?el.value.trim():''}
function pal(id){return PAL[(id||'a').charCodeAt(0)%5]}


// Image compression for payment screenshots
function compressImg(file,cb){
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=900,ratio=Math.min(MAX/img.width,MAX/img.height,1);
      var c=document.createElement('canvas');
      c.width=Math.round(img.width*ratio);c.height=Math.round(img.height*ratio);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      cb(c.toDataURL('image/jpeg',0.65));
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

var _toastTimer;
function toast(msg,type){
  var el=document.getElementById('toast');
  var colors={ok:'#27500A',err:'#A32D2D',warn:'#7A5500'};
  var icons={ok:'&#10003;',err:'&#10005;',warn:'&#9888;'};
  el.style.background=colors[type||'ok'];
  el.innerHTML=(icons[type||'ok']||'')+'&nbsp;&nbsp;'+esc(msg);
  el.style.display='block';
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){el.style.display='none';},3200);
}

// ── Firebase data layer ──────────────────────────────────────
async function dbLoad(){
  try{
    var timeout=new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},10000);});
    var snap=await Promise.race([DB_REF.once('value'),timeout]);
    var val=snap.val();
    if(val&&typeof val==='object')return val;
  }catch(e){
    console.error('Firebase load error:',e);
    toast('Could not connect to database — working offline','err');
  }
  return{adminPass:'Admin@123',clubCode:'SHUTTLE250',members:{}};
}

async function dbSave(){
  try{
    await DB_REF.set(db);
    lastSaved=new Date();
    var el=document.getElementById('_lsv');
    if(el)el.textContent='Saved '+lastSaved.toLocaleTimeString();
    return true;
  }catch(e){
    toast('Save failed: '+(e.message||'network error'),'err');
    return false;
  }
}

// Refresh live counts without full re-render
function refreshLiveCounts(){
  var count=Object.keys(db.members||{}).length;
  var withP=Object.values(db.members||{}).filter(function(m){return m.profile;}).length;
  document.querySelectorAll('._mc_total').forEach(function(el){el.textContent=count;});
  document.querySelectorAll('._mc_strip').forEach(function(el){el.textContent=count+' members';});
  // Update admin stat boxes if visible
  var tb=document.getElementById('atbody');
  if(tb){
    // Admin screen is open — re-render counts
    var allEl=document.querySelectorAll('._stat_total');
    var fillEl=document.querySelectorAll('._stat_fill');
    var pendEl=document.querySelectorAll('._stat_pend');
    allEl.forEach(function(el){el.textContent=count;});
    fillEl.forEach(function(el){el.textContent=withP;});
    pendEl.forEach(function(el){el.textContent=count-withP;});
  }
}

// ── App initialisation ───────────────────────────────────────
async function init(){
  // Show the login screen IMMEDIATELY — don't wait for Firebase
  render();

  if(!CONFIG_READY){
    document.getElementById('root').innerHTML=
      '<div style="padding:20px;"><div class="config-warning">'+
      '<h3>⚙️ Firebase Setup Required</h3>'+
      '<p>To enable cross-browser access, open <code>index.html</code> in a text editor and replace the placeholder values in <code>FIREBASE_CONFIG</code> with your Firebase project credentials.</p>'+
      '<p style="margin-top:10px;"><strong>Steps:</strong><br>'+
      '1. Go to <a href="https://console.firebase.google.com" target="_blank" style="color:#185FA5;">console.firebase.google.com</a><br>'+
      '2. Create a free project → Add Web App → copy config<br>'+
      '3. Enable Realtime Database (set rules to allow read/write)<br>'+
      '4. Paste the config into this file</p>'+
      '</div></div>';
    return;
  }

  try{
    if(typeof firebase==='undefined') throw new Error('Firebase SDK not loaded');
    firebase.initializeApp(FIREBASE_CONFIG);
    AUTH = firebase.auth();
    DB_REF = firebase.database().ref('bbl_syndicate');

    // Load DB on init — reads are publicly allowed
    db = await dbLoad();
    setupLiveListener();

    // Restore a persisted Firebase Auth session if one exists
    AUTH.onAuthStateChanged(async function(firebaseUser){
      if(firebaseUser && !user){
        var email = firebaseUser.email || '';
        if(email.endsWith('@bbl-group.app')){
          var memberId = email.replace('@bbl-group.app','');
          if(db.members && db.members[memberId]){
            user = {id:memberId, name:db.members[memberId].name, isAdmin:false};
            screen = 'dashboard';
            render();
            toast('Welcome back, '+db.members[memberId].name+'!');
          }
        } else if(firebaseUser.isAnonymous){
          // Anonymous session kept for admin — do nothing here
        }
      }
    });
  }catch(e){
    console.error(e);
  }
}

function setupLiveListener(){
  DB_REF.on('value', function(snap){
    var val = snap.val();
    if(val && typeof val === 'object'){
      if(!_saving){
        db = val;
        refreshLiveCounts();
        if(screen === 'dashboard' && (tab === 'directory' || tab === 'board')){
          updateDir();
        }
      }
    }
  });
}

async function doForgotPass(){
  var id=gv('fpid'),name=gv('fpname'),np=gv('fpnew'),nc=gv('fpconf');
  if(!id||!name||!np||!nc)return toast('Please fill all fields','err');
  if(np.length<6)return toast('Password must be at least 6 characters','err');
  if(np!==nc)return toast('Passwords do not match','err');
  var mem=db.members[id];
  if(!mem)return toast('Member ID not found','err');
  if(mem.name.trim().toLowerCase()!==name.trim().toLowerCase())return toast('Name does not match our records','err');

  var email=id+'@bbl-group.app';
  try{
    var oldPass=mem.password||null;
    if(oldPass){
      // Member still has old DB password (not yet migrated) — sign in with it to update Firebase Auth
      await AUTH.signInWithEmailAndPassword(email,oldPass).catch(async function(){
        // No Firebase Auth account yet — create one with new password directly
        await AUTH.createUserWithEmailAndPassword(email,np);
      });
    }
    if(AUTH.currentUser && AUTH.currentUser.email===email){
      await AUTH.currentUser.updatePassword(np);
    }
    // Clean up old DB password
    delete mem.password;
    _saving=true;
    await dbSave();
    _saving=false;
    await AUTH.signOut();
    screen='login';
    render();
    toast('Password reset successfully! Please sign in.');
  }catch(err){
    toast('Reset failed: '+(err.message||'Please contact your admin'),'err');
  }
}

async function doSignOut(){
  user=null;
  screen='login';
  if(AUTH){try{await AUTH.signOut();}catch(e){}}
  render();
}

// ── Login / register actions ─────────────────────────────────
async function doLogin(){
  var id=gv('lid'),pass=gv('lpass');
  if(!id||!pass)return toast('Please enter both ID and password','err');

  // Admin — DB is publicly readable so just check password directly
  if(id==='admin'){
    if(pass===db.adminPass){
      // Sign in anonymously so admin can write to DB
      try{ await AUTH.signInAnonymously(); }catch(e){}
      user={id:'admin',name:'Administrator',isAdmin:true};
      screen='admin';render();return;
    }else{
      return toast('Invalid admin password','err');
    }
  }

  var mem=db.members&&db.members[id];
  if(!mem)return toast('Invalid member ID or password','err');

  var email=id+'@bbl-group.app';

  // Try Firebase Auth (already-migrated members)
  try{
    await AUTH.signInWithEmailAndPassword(email,pass);
    user={id:id,name:mem.name,isAdmin:false};
    screen='dashboard';tab='directory';render();
    toast('Welcome back, '+mem.name+'!');
    return;
  }catch(authErr){}

  // Migration path — old member with plain-text password in DB
  if(mem.password && mem.password===pass){
    try{
      await AUTH.createUserWithEmailAndPassword(email,pass);
      // Clean up plain-text password now that Firebase Auth account exists
      delete db.members[id].password;
      _saving=true;
      await dbSave();
      _saving=false;
      user={id:id,name:mem.name,isAdmin:false};
      screen='dashboard';tab='directory';render();
      toast('Welcome back, '+mem.name+'! Account upgraded securely.');
    }catch(createErr){
      // Firebase Auth account already exists but with different password — just log them in via DB check
      if(createErr.code==='auth/email-already-in-use'){
        user={id:id,name:mem.name,isAdmin:false};
        screen='dashboard';tab='directory';render();
        toast('Welcome back, '+mem.name+'!');
      }else{
        toast('Login error: '+(createErr.message||'Please try again'),'err');
      }
    }
    return;
  }

  toast('Invalid member ID or password','err');
}

async function doRegister(){
  var name=gv('rname'),id=gv('rid'),pass=gv('rpass'),code=gv('rcode');
  if(!name||!id||!pass||!code)return toast('Please fill all required fields','err');
  if(pass.length<6)return toast('Password must be at least 6 characters','err');
  if(!/^[a-z0-9._-]+$/.test(id))return toast('Member ID can only contain lowercase letters, numbers, dots, hyphens','err');
  if(code!==db.clubCode)return toast('Invalid registration code','err');
  if(db.members&&db.members[id])return toast('This member ID is already taken','err');

  var email=id+'@bbl-group.app';
  try{
    // Create Firebase Auth account for write access
    await AUTH.createUserWithEmailAndPassword(email,pass);
    if(!db.members)db.members={};
    db.members[id]={name:name,joinedAt:new Date().toISOString(),profile:null};
    _saving=true;
    if(await dbSave()){
      _saving=false;
      user={id:id,name:name,isAdmin:false};
      screen='dashboard';tab='directory';render();
      toast('Welcome '+name+'! Please fill in your profile below.');
    }else{
      _saving=false;
      if(AUTH.currentUser)await AUTH.currentUser.delete();
      toast('Registration failed — please try again','err');
    }
  }catch(err){
    if(err.code==='auth/email-already-in-use'){
      toast('This member ID is already registered. Try signing in.','err');
    }else{
      toast('Registration failed: '+(err.message||'Please try again'),'err');
    }
  }
}

function fmtTime(ts){
  if(!ts)return '';
  var d=new Date(ts);
  var now=new Date();
  var diff=Math.floor((now-d)/1000);
  if(diff<60)return 'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  if(diff<604800)return Math.floor(diff/86400)+'d ago';
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function postId(){return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

async function doPost(){
  var txt=gv('newpost');

  if(!db.posts)db.posts={};
  var pid=postId();
  db.posts[pid]={aid:user.id,an:user.name,txt:txt.trim(),ts:new Date().toISOString(),replies:{}};
  _saving=true;
  if(await dbSave()){_saving=false;tab='board';render();toast('Posted!');}
  else{_saving=false;}
}

async function doReply(pid){
  var inp=document.getElementById('ri_'+pid);
  if(!inp||!inp.value.trim())return toast('Please write a reply first','err');
  if(inp.value.length>300)return toast('Reply too long (max 300 characters)','err');
  if(!db.posts[pid])return toast('Post not found','err');

  var rid=postId();

  _saving=true;
  if(await dbSave()){_saving=false;tab='board';render();toast('Reply sent!');}
  else{_saving=false;}
}

  delete db.posts[pid];

function filterMembers(all){

    var m=e[1];
    if(!srch)return true;

    '<p style="font-size:15px;font-weight:800;margin:0 0 12px;color:#1a1a2e;">All members (<span class="_mc_total">'+all.length+'</span>)</p>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;">'+
    '<input placeholder="Search members..." value="'+esc(asrch)+'" oninput="asrch=this.value;updAdmin()" style="flex:1;min-width:200px;"/>'+
    '<button class="btn btn-ghost btn-sm" onclick="exportCSV()">&#11015; CSV</button></div></div>'+
    '<div id="amobile">'+admCardRows(fil)+'</div>'+
    '<div style="overflow-x:auto;display:none;" id="atable"><table style="width:100%;border-collapse:collapse;font-size:13px;min-width:600px;">'+
    '<thead><tr style="background:#f5f7fb;">'+
    ['Name','Member ID','Designation','Company','Industry','Membership','Profile',''].map(function(h){return '<th style="text-align:left;padding:10px 12px;font-weight:800;color:#555;font-size:11px;border-bottom:2px solid #eee;text-transform:uppercase;letter-spacing:.05em;">'+h+'</th>';}).join('')+
    '</tr></thead><tbody id="atbody">'+admRows(fil)+'</tbody></table></div></div></div>';
}

function admCardRows(fil){
  if(!fil.length)return '<div style="text-align:center;padding:3rem;color:#ccc;font-size:14px;">No members found</div>';
  return fil.map(function(e){
    var id=e[0],m=e[1],p=m.profile||{},pl=pal(id);
    var indBadge=p.ind?'<span class="badge" style="background:'+pl.bg+';color:'+pl.txt+';border:1.5px solid '+pl.bdr+';">'+esc(p.ind)+'</span>':'<span style="font-size:12px;color:#ccc;">No industry</span>';
    var status=m.profile?'<span style="font-size:12px;font-weight:800;color:#3B6D11;">&#10003; Profile Complete</span>':'<span style="font-size:12px;font-weight:700;color:#bbb;">Profile Pending</span>';
    var company=p.co?'<div style="font-size:12px;color:#666;margin-top:2px;"><strong>Company:</strong> '+esc(p.co)+'</div>':'';
    var designation=p.des?'<div style="font-size:12px;color:#666;"><strong>Role:</strong> '+esc(p.des)+'</div>':'';
    var rp=m.regPayment||{},af=m.annualFee||{};
    var rpBadge=rp.status==='verified'?'<span style="font-size:11px;font-weight:800;color:#3B6D11;background:#EAF3DE;padding:2px 8px;border-radius:99px;">&#128178; Reg Fee &#10003;</span>':rp.screenshot?'<button class="btn btn-sm" style="background:#FFF8E7;color:#856404;border:1.5px solid #FAC775;font-size:11px;padding:3px 8px;" onclick="viewPayment(\''+id+'\',\'reg\')">&#128178; Verify Reg Fee</button>':'<span style="font-size:11px;color:#ccc;">&#128178; No screenshot</span>';
    var afBadge=af.status==='active'?'<span style="font-size:11px;font-weight:800;color:#185FA5;background:#EBF4FF;padding:2px 8px;border-radius:99px;">&#128197; Annual &#10003; '+esc(af.dueDate||'')+'</span>':af.status==='expired'?'<span style="font-size:11px;font-weight:800;color:#c0392b;background:#FDECEA;padding:2px 8px;border-radius:99px;">&#9888; Annual Expired</span>':af.screenshot?'<button class="btn btn-sm" style="background:#EBF4FF;color:#185FA5;border:1.5px solid #B3D4F5;font-size:11px;padding:3px 8px;" onclick="viewPayment(\''+id+'\',\'annual\')">&#128197; Verify Annual Fee</button>':'<span style="font-size:11px;color:#ccc;">&#128197; No annual payment</span>';
    var ms=m.membershipStatus||'pending';
    var msBadge=ms==='active'?'<span style="font-size:12px;font-weight:800;color:#fff;background:#27500A;padding:3px 10px;border-radius:99px;">&#10003; Active Member</span>':'<span style="font-size:12px;font-weight:800;color:#856404;background:#FFF8E7;padding:3px 10px;border-radius:99px;border:1.5px solid #FAC775;">&#9679; Membership Pending</span>';
    var approveBtn=ms==='active'?'':rp.status==='verified'?'<button class="btn btn-green btn-sm" style="margin-top:8px;width:100%;" onclick="approveMembership(\''+id+'\')" >&#10003; Approve Membership</button>':'<button class="btn btn-green btn-sm" style="margin-top:8px;width:100%;background:#27500A;" onclick="markPaidAndApprove(\''+id+'\')" >&#128178; Mark Paid & Approve</button>';
    return '<div class="admin-member-card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;flex-wrap:wrap;">'+
      '<div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">'+
      '<div class="av" style="width:36px;height:36px;font-size:12px;background:'+pl.bg+';color:'+pl.txt+';border:1.5px solid '+pl.bdr+';">'+initials(m.name)+'</div>'+
      '<div style="flex:1;min-width:0;"><p style="font-size:14px;font-weight:800;color:#1a1a2e;margin-bottom:2px;">'+esc(m.name)+'</p>'+
      '<p style="font-size:11px;color:#aaa;font-family:monospace;">'+esc(id)+'</p></div></div>'+
      '<div style="display:flex;flex-direction:column;gap:5px;"><button class="btn btn-orange btn-sm" onclick="adminResetPass(\''+id+'\')">&#128274; Reset PW</button><button class="btn btn-red btn-sm" onclick="doRemove(\''+id+'\')">Remove</button></div></div>'+
      msBadge+
      '<div style="margin-top:8px;margin-bottom:6px;">'+indBadge+'</div>'+designation+company+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;">'+rpBadge+afBadge+'</div>'+
      '<div style="margin-top:6px;">'+status+'</div>'+
      approveBtn+'</div>';
  }).join('');
}

function admRows(fil){
  if(!fil.length)return '<tr><td colspan="8" style="text-align:center;padding:2.5rem;color:#ccc;font-size:14px;">No members found</td></tr>';
  return fil.map(function(e){
    var id=e[0],m=e[1],p=m.profile||{},pl=pal(id);
    var rp=m.regPayment||{};
    var ms=m.membershipStatus||'pending';
    var indBadge=p.ind?'<span class="badge" style="background:'+pl.bg+';color:'+pl.txt+';">'+esc(p.ind)+'</span>':'&mdash;';
    var profileBadge=m.profile?'<span style="font-size:11px;font-weight:800;color:#3B6D11;">&#10003; Filled</span>':'<span style="font-size:11px;font-weight:700;color:#bbb;">Pending</span>';
    var payBadge=rp.status==='verified'?'<span style="font-size:11px;font-weight:800;color:#3B6D11;">&#128178; &#10003; Paid</span>':rp.screenshot?'<button class="btn btn-sm" style="background:#FFF8E7;color:#856404;border:1.5px solid #FAC775;font-size:11px;padding:2px 7px;" onclick="viewPayment(\''+id+'\',\'reg\')">&#128178; Verify</button>':'<span style="font-size:11px;color:#ccc;">No screenshot</span>';
    var msBadge=ms==='active'?'<span style="font-size:11px;font-weight:800;color:#fff;background:#27500A;padding:2px 9px;border-radius:99px;">&#10003; Active</span>':'<span style="font-size:11px;font-weight:800;color:#856404;background:#FFF8E7;padding:2px 9px;border-radius:99px;border:1px solid #FAC775;">Pending</span>';
    var approveBtn=ms==='active'?'':rp.status==='verified'?'<button class="btn btn-green btn-sm" style="font-size:11px;padding:3px 10px;" onclick="approveMembership(\''+id+'\')" >&#10003; Approve</button>':'<button class="btn btn-green btn-sm" style="font-size:11px;padding:3px 10px;background:#27500A;" onclick="markPaidAndApprove(\''+id+'\')" >&#128178; Mark Paid & Approve</button>';
    return '<tr style="border-bottom:1px solid #f2f4f8;">'+
      '<td style="padding:11px 12px;"><div style="display:flex;align-items:center;gap:9px;">'+
      '<div class="av" style="width:32px;height:32px;font-size:11px;background:'+pl.bg+';color:'+pl.txt+';border:1.5px solid '+pl.bdr+';">'+initials(m.name)+'</div>'+
      '<span style="font-weight:700;">'+esc(m.name)+'</span></div></td>'+
      '<td style="padding:11px 12px;font-family:monospace;font-size:11px;color:#aaa;">'+esc(id)+'</td>'+
      '<td style="padding:11px 12px;">'+esc(p.des||'—')+'</td>'+
      '<td style="padding:11px 12px;">'+esc(p.co||'—')+'</td>'+
      '<td style="padding:11px 12px;">'+indBadge+'</td>'+
      '<td style="padding:11px 12px;">'+msBadge+'<br/>'+payBadge+'</td>'+
      '<td style="padding:11px 12px;">'+profileBadge+'</td>'+
      '<td style="padding:11px 12px;"><div style="display:flex;gap:5px;flex-wrap:wrap;">'+approveBtn+'<button class="btn btn-orange btn-sm" onclick="adminResetPass(\''+id+'\')">&#128274; Reset PW</button><button class="btn btn-red btn-sm" onclick="doRemove(\''+id+'\')">Remove</button></div></td></tr>';
  }).join('');
}

function updAdmin(){
  var all=Object.entries(db.members);
  var fil=all.filter(function(e){
    var id=e[0],m=e[1];
    if(!asrch)return true;
    var q=asrch.toLowerCase(),p=m.profile||{};
    var vals=[id,m.name,p.co,p.ind,p.des];
    for(var i=0;i<vals.length;i++){if((vals[i]||'').toLowerCase().indexOf(q)>=0)return true;}
    return false;
  });
  var tb=document.getElementById('atbody');
  var mb=document.getElementById('amobile');
  if(tb)tb.innerHTML=admRows(fil);
  if(mb)mb.innerHTML=admCardRows(fil);
}

async function doCode(){
  var c=gv('acode');
  if(!c||c.length<4)return toast('Code must be at least 4 characters','err');
  db.clubCode=c;
  _saving=true;
  if(await dbSave()){_saving=false;toast('Registration code updated!');}
  else{_saving=false;}
}

async function doPass(){
  var p=gv('apass');
  if(!p||p.length<6)return toast('Password must be at least 6 characters','err');
  db.adminPass=p;
  _saving=true;
  if(await dbSave()){_saving=false;toast('Admin password updated!');render();}
  else{_saving=false;}
}

async function doRemove(id){
  if(!confirm('Remove member "'+id+'"? This cannot be undone.'))return;
  delete db.members[id];
  _saving=true;
  if(await dbSave()){_saving=false;toast('Member removed.');render();}
  else{_saving=false;}
}

// ── Payment Verification ─────────────────────────────────────
function viewPayment(id, type){
  var m=db.members[id];
  if(!m)return;
  var pay=type==='reg'?m.regPayment:m.annualFee;
  if(!pay||!pay.screenshot)return toast('No screenshot uploaded yet','err');
  var label=type==='reg'?'Registration Fee (₹200)':'Annual Membership Fee (₹200)';
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;';
  overlay.onclick=function(e){if(e.target===overlay)document.body.removeChild(overlay);};
  overlay.innerHTML='<div style="background:#fff;border-radius:14px;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'+
    '<p style="font-weight:900;font-size:15px;color:#1a1a2e;margin:0;">'+label+'</p>'+
    '<button onclick="document.body.removeChild(this.closest(\'div\').parentElement.parentElement)" style="background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;">&#10005;</button></div>'+
    '<p style="font-size:13px;color:#666;margin:0 0 10px;"><strong>Member:</strong> '+esc(m.name)+' ('+esc(id)+')</p>'+
    '<p style="font-size:12px;color:#aaa;margin:0 0 12px;">Submitted: '+(pay.submittedAt?new Date(pay.submittedAt).toLocaleString():'Unknown')+'</p>'+
    '<img src="'+pay.screenshot+'" style="width:100%;border-radius:8px;border:1.5px solid #eee;margin-bottom:14px;"/>'+
    '<div style="display:flex;gap:8px;">'+
    '<button class="btn btn-green" style="flex:1;" onclick="verifyPayment(\''+id+'\',\''+type+'\');document.body.removeChild(this.closest(\'div\').parentElement.parentElement)">&#10003; Mark as Verified</button>'+
    '<button class="btn btn-red" style="flex:1;" onclick="rejectPayment(\''+id+'\',\''+type+'\');document.body.removeChild(this.closest(\'div\').parentElement.parentElement)">&#10005; Reject</button>'+
    '</div></div>';
  document.body.appendChild(overlay);
}

async function approveMembership(id){
  var m=db.members[id];
  if(!m)return toast('Member not found','err');
  if((m.regPayment||{}).status!=='verified')return toast('Please verify the registration payment first','err');
  m.membershipStatus='active';
  m.approvedAt=new Date().toISOString();
  _saving=true;
  if(await dbSave()){
    _saving=false;
    toast(m.name+' is now an Active Member! &#10003;');
    render();
  }else{_saving=false;}
}

async function markPaidAndApprove(id){
  var m=db.members[id];
  if(!m)return toast('Member not found','err');
  if(!confirm('Mark payment as received and approve membership for '+m.name+'?'))return;
  if(!m.regPayment)m.regPayment={};
  m.regPayment.status='verified';
  m.regPayment.verifiedAt=new Date().toISOString();
  m.regPayment.note='Marked paid by admin (offline payment)';
  m.membershipStatus='active';
  m.approvedAt=new Date().toISOString();
  _saving=true;
  if(await dbSave()){
    _saving=false;
    toast(m.name+' — payment marked & membership approved! &#10003;');
    render();
  }else{_saving=false;}
}


async function verifyPayment(id, type){
  var m=db.members[id];
  if(!m)return;
  if(type==='reg'){
    if(!m.regPayment)m.regPayment={};
    m.regPayment.status='verified';
    m.regPayment.verifiedAt=new Date().toISOString();
  }else{
    if(!m.annualFee)m.annualFee={};
    m.annualFee.status='active';
    m.annualFee.verifiedAt=new Date().toISOString();
    var due=new Date();due.setFullYear(due.getFullYear()+1);
    m.annualFee.dueDate=due.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    m.annualFee.year=new Date().getFullYear();
  }
  _saving=true;
  if(await dbSave()){_saving=false;toast('Payment verified for '+m.name+'!');render();}
  else{_saving=false;}
}

async function rejectPayment(id, type){
  var m=db.members[id];
  if(!m)return;
  if(type==='reg'){
    if(m.regPayment){delete m.regPayment.screenshot;m.regPayment.status='rejected';}
  }else{
    if(m.annualFee){delete m.annualFee.screenshot;m.annualFee.status='rejected';}
  }
  _saving=true;
  if(await dbSave()){_saving=false;toast('Payment rejected — member notified on next login.');render();}
  else{_saving=false;}
}


async function adminResetPass(id){
  var mem=db.members[id];
  if(!mem)return toast('Member not found','err');
  var np=prompt('Set new password for '+mem.name+' ('+id+'):');
  if(!np)return;
  if(np.length<6)return toast('Password must be at least 6 characters','err');

  var email=id+'@bbl-group.app';
  var oldPass=mem.password||null;

  try{
    // Use a secondary Firebase app instance so admin session is not disturbed
    var secondaryApp;
    try{ secondaryApp=firebase.app('bbl-secondary'); }
    catch(e){ secondaryApp=firebase.initializeApp(FIREBASE_CONFIG,'bbl-secondary'); }
    var secondaryAuth=secondaryApp.auth();

    if(oldPass){
      // Member not yet fully migrated — sign in with old DB password and update
      try{
        await secondaryAuth.signInWithEmailAndPassword(email,oldPass);
        await secondaryAuth.currentUser.updatePassword(np);
        await secondaryAuth.signOut();
        delete mem.password;
      }catch(e){
        // Firebase Auth account doesn't exist yet — store temp password in DB
        // Member will auto-create Auth account on next login
        mem.password=np;
      }
    }else{
      // Member already fully migrated — we can't update their Firebase Auth password
      // from the browser without knowing their current password.
      // Store a temp password in DB — member will be migrated on next login.
      mem.password=np;
      toast('Note: Member will be prompted to re-authenticate on next login.','warn');
    }

    _saving=true;
    if(await dbSave()){
      _saving=false;
      toast('Password reset for '+mem.name+'!');
      render();
    }else{_saving=false;}
  }catch(err){
    toast('Reset failed: '+(err.message||'Try again'),'err');
  }
}

// ── Backup / Restore ─────────────────────────────────────────
function doExport(){
  try{
    var memberCount=Object.keys(db.members).length;
    var exportData={version:'2.0',timestamp:new Date().toISOString(),memberCount:memberCount,exportedBy:'Admin',data:db};
    var blob=new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    var dateStr=new Date().toISOString().slice(0,10);
    a.href=url;a.download='BBL_Directory_Backup_'+dateStr+'_'+memberCount+'members.json';a.click();
    URL.revokeObjectURL(url);
    toast('Backup downloaded!','ok');
  }catch(e){toast('Export failed: '+e.message,'err');}
}

function triggerImport(){document.getElementById('fileInput').click();}

function doImport(){
  var fileInput=document.getElementById('fileInput');
  if(!fileInput.files||!fileInput.files[0])return;
  var file=fileInput.files[0];
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var importData=JSON.parse(e.target.result);
      if(!importData.data||typeof importData.data!=='object')return toast('Invalid file format','err');
      var newCount=Object.keys(importData.data.members||{}).length;
      var curCount=Object.keys(db.members).length;
      var msg='Import '+newCount+' members (you currently have '+curCount+')?';
      if(importData.timestamp)msg='Import directory from '+new Date(importData.timestamp).toLocaleDateString()+' ('+newCount+' members)?';
      if(!confirm(msg+' This will replace current data.'))return;
      db=importData.data;
      _saving=true;
      if(await dbSave()){_saving=false;toast('Directory restored — '+newCount+' members.','ok');render();}
      else{_saving=false;}
    }catch(err){toast('Import failed: invalid file','err');}
  };
  reader.readAsText(file);
  fileInput.value='';
}

function exportCSV(){
  var all=Object.entries(db.members);
  if(!all.length)return toast('No members to export','err');
  var headers=['Member ID','Name','Mobile','Email','Location','Age Group','Designation','Company','Industry','Profession Type','Playing Since','Skill Level','Frequency','Preferred Time','What They Offer','Open to Contact','LinkedIn','Website','Joined'];
  var rows=all.map(function(e){
    var id=e[0],m=e[1],p=m.profile||{};
    return [id,m.name,p.mob,p.eml,p.loc,p.ag,p.des,p.co,p.ind,p.pty,p.yp,p.sl,p.pf,p.pt,p.mo,p.otc,p.li,p.ws,(m.joinedAt||'').slice(0,10)].map(function(v){return '"'+(v||'').replace(/"/g,'""')+'"';}).join(',');
  });
  var blob=new Blob([headers.join(',')+'\n'+rows.join('\n')],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='BBL_Members.csv';a.click();
  URL.revokeObjectURL(url);
  toast('CSV downloaded!');
}

// ── Start ────────────────────────────────────────────────────
init();
</script>
